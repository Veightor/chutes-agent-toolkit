model:
  default: gpt-5.4
  provider: openai-codex

custom_providers:
  - name: Chutes
    base_url: https://llm.chutes.ai/v1
    key_env: CHUTES_API_KEY
    api_mode: chat_completions
    model: default:latency

smart_model_routing:
  enabled: true
  cheap_model:
    provider: custom:chutes
    model: default:latency
